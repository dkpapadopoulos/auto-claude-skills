name: Auto Version Bump

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    # Skip if the push was made by this workflow (prevent infinite loop)
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
          # Default GITHUB_TOKEN pushes the version bump to THIS repo (main has
          # no branch protection; `permissions: contents: write` is declared
          # above). The cross-repo marketplace push uses MARKETPLACE_PAT
          # explicitly in its clone URL below, so a PAT issue can never block
          # the in-repo version bump.

      - name: Determine bump type from commit message
        id: bump
        env:
          MSG: ${{ github.event.head_commit.message }}
        run: |
          if echo "$MSG" | grep -qE '^feat!:|^BREAKING CHANGE:'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qE '^feat:'; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump plugin.json version
        id: version
        run: |
          CURRENT=$(jq -r '.version' .claude-plugin/plugin.json)
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          case "${{ steps.bump.outputs.type }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW="${MAJOR}.${MINOR}.${PATCH}"
          jq --arg v "$NEW" '.version = $v' .claude-plugin/plugin.json > tmp.json
          mv tmp.json .claude-plugin/plugin.json

          echo "old=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "new=$NEW" >> "$GITHUB_OUTPUT"

      - name: Commit version bump to plugin repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git push

      - name: Update marketplace repo
        run: |
          git clone https://x-access-token:${{ secrets.MARKETPLACE_PAT }}@github.com/dkpapadopoulos/auto-claude-skills-marketplace.git /tmp/marketplace
          cd /tmp/marketplace

          jq --arg v "${{ steps.version.outputs.new }}" \
            '.plugins |= map(if .name == "auto-claude-skills" then .version = $v else . end)' \
            .claude-plugin/marketplace.json > tmp.json
          mv tmp.json .claude-plugin/marketplace.json

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/marketplace.json
          git commit -m "chore: bump auto-claude-skills to ${{ steps.version.outputs.new }} [skip ci]"
          git push
